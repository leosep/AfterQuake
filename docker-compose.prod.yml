version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - ConnectionStrings__Redis=${REDIS_CONNECTION}
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_KEY}
      - ApplicationInsights__ConnectionString=${APPINSIGHTS_CONNECTION}
      - Email__SmtpHost=${SMTP_HOST}
      - Email__SmtpPort=${SMTP_PORT}
      - Email__Username=${SMTP_USER}
      - Email__Password=${SMTP_PASS}
      - Email__EnableSsl=true
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 1G
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - app-logs:/app/logs
      - app-uploads:/app/wwwroot/uploads

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  app-logs:
  app-uploads:
