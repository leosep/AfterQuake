input {
  file {
    path => "/app/logs/afterquake-*.log"
    type => "serilog"
    codec => "json"
  }
}

filter {
  if [type] == "serilog" {
    json {
      source => "message"
    }
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST}"]
    index => "afterquake-logs-%{+YYYY.MM.dd}"
  }
}
